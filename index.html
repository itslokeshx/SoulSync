<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <title>SoulSync – Tamil & Indian Music</title>
    <link
      rel="icon"
      type="image/svg+xml"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0' y1='0' x2='1' y2='1'%3E%3Cstop offset='0%25' stop-color='%231db954'/%3E%3Cstop offset='100%25' stop-color='%2334d399'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect width='100' height='100' rx='22' fill='%23121212'/%3E%3Ccircle cx='50' cy='50' r='28' fill='none' stroke='url(%23g)' stroke-width='5'/%3E%3Ccircle cx='50' cy='50' r='8' fill='url(%23g)'/%3E%3Cpath d='M58 30 L58 52' stroke='url(%23g)' stroke-width='5' stroke-linecap='round'/%3E%3C/svg%3E"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <style>
      * {
        font-family: "Inter", system-ui, sans-serif;
      }
      input[type="range"] {
        -webkit-appearance: none;
        appearance: none;
        background: transparent;
        cursor: pointer;
      }
      input[type="range"]::-webkit-slider-runnable-track {
        background: #535353;
        border-radius: 9999px;
        height: 4px;
      }
      input[type="range"]::-webkit-slider-thumb {
        -webkit-appearance: none;
        appearance: none;
        margin-top: -5px;
        background: #fff;
        border-radius: 50%;
        height: 14px;
        width: 14px;
        opacity: 0;
        transition: opacity 0.15s;
      }
      input[type="range"]:hover::-webkit-slider-thumb {
        opacity: 1;
      }
      input[type="range"]::-moz-range-track {
        background: #535353;
        border-radius: 9999px;
        height: 4px;
      }
      input[type="range"]::-moz-range-thumb {
        background: #fff;
        border: none;
        border-radius: 50%;
        height: 14px;
        width: 14px;
        opacity: 0;
        transition: opacity 0.15s;
      }
      input[type="range"]:hover::-moz-range-thumb {
        opacity: 1;
      }
      input[type="range"].progress-bar::-webkit-slider-runnable-track {
        background: linear-gradient(
          to right,
          #1db954 var(--progress, 0%),
          #535353 var(--progress, 0%)
        );
      }
      input[type="range"].progress-bar::-moz-range-track {
        background: linear-gradient(
          to right,
          #1db954 var(--progress, 0%),
          #535353 var(--progress, 0%)
        );
      }
      input[type="range"].progress-bar::-moz-range-progress {
        background: #1db954;
        border-radius: 9999px;
      }
      input[type="range"].volume-bar::-webkit-slider-runnable-track {
        background: linear-gradient(
          to right,
          #fff var(--volume, 100%),
          #535353 var(--volume, 100%)
        );
      }
      input[type="range"].volume-bar:hover::-webkit-slider-runnable-track {
        background: linear-gradient(
          to right,
          #1db954 var(--volume, 100%),
          #535353 var(--volume, 100%)
        );
      }
      input[type="range"].volume-bar::-moz-range-track {
        background: linear-gradient(
          to right,
          #fff var(--volume, 100%),
          #535353 var(--volume, 100%)
        );
      }
      input[type="range"].volume-bar::-moz-range-progress {
        background: #fff;
        border-radius: 9999px;
      }
      input[type="range"].volume-bar:hover::-moz-range-progress {
        background: #1db954;
        border-radius: 9999px;
      }
      input[type="range"].progress-bar::-webkit-slider-thumb,
      input[type="range"].volume-bar::-webkit-slider-thumb {
        position: relative;
        z-index: 2;
      }
      ::-webkit-scrollbar {
        width: 8px;
        height: 8px;
      }
      ::-webkit-scrollbar-track {
        background: transparent;
      }
      ::-webkit-scrollbar-thumb {
        background: #535353;
        border-radius: 4px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #b3b3b3;
      }
      .hide-scrollbar::-webkit-scrollbar {
        display: none;
      }
      .hide-scrollbar {
        -ms-overflow-style: none;
        scrollbar-width: none;
      }
    </style>
  </head>
  <body class="bg-black overflow-hidden">
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
